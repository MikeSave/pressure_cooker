<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainy – Build Sentences!</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/open-dyslexic" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ======================== GAME 2 – SENTENCE BUILDER ======================== -->
    <section id="screen-sentence" class="screen">

        <div class="game-header">
            <button class="pill-btn" onclick="window.location.href='index.html'">← Home</button>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="audio-btn" onclick="speakSentence()" title="Read aloud">🔊</button>
                <div class="score-badge" style="font-size:.95rem;">Q <span id="sent-qnum">1</span> / <span
                        id="sent-qtotal">6</span></div>
                <div class="score-badge">⭐ <span id="sent-score">0</span></div>
            </div>
        </div>

        <div id="sentence-main">
            <div class="blackboard-wrap">
                <img src="assets/table.png" alt="Blackboard frame" />
                <div class="blackboard-inner">
                    <div class="sentence-text" id="sent-text"></div>
                </div>
                <!-- Brain images that visually cover the board (left & right) -->
                <div class="brain-overlay" id="brain-overlay">
                    <!-- choice-row will be populated by JS with two choices (one above each brain) -->
                    <div class="choice-row" id="choice-row"></div>
                </div>
            </div>

            <div class="sentence-feedback" id="sent-feedback"></div>
        </div>
    </section>

    <!-- ========================= SHARED MODAL ========================== -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-emoji" id="modal-emoji">🎉</div>
            <h2 class="modal-title" id="modal-title">Amazing!</h2>
            <p class="modal-sub" id="modal-sub"></p>
            <p class="modal-score" id="modal-score"></p>
            <div class="modal-actions">
                <button class="modal-btn green" id="modal-play-again" onclick="modalPlayAgain()">Play Again</button>
                <button class="modal-btn purple" onclick="closeModal(); window.location.href='index.html'">🏠
                    Home</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="sentence.js"></script>

</body>

</html>
