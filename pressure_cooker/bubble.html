<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainy – Anagram Swipe!</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/open-dyslexic" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ======================== GAME 1 – ANAGRAM SWIPE ======================== -->
    <section id="screen-bubble" class="screen">
        <div class="bg-cover" id="bubble-bg"></div>

        <div class="game-header">
            <button class="pill-btn" onclick="window.location.href='index.html'">← Home</button>
            <div style="display:flex;gap:10px;align-items:center;">
                <button class="audio-btn" onclick="speakBubble()" title="Read aloud">🔊</button>
                <div class="score-badge">⭐ Score: <span id="bubble-score">0</span></div>
            </div>
        </div>

        <!-- Main game area -->
        <div id="bubble-game">

            <!-- Two word blank rows -->
            <div id="bubble-words">
                <!-- Filled by JS -->
            </div>

            <!-- Letter tiles in a ring -->
            <div id="bubble-tiles-area">
                <svg id="bubble-svg" xmlns="http://www.w3.org/2000/svg"></svg>
                <!-- Tiles added by JS -->
            </div>

            <!-- Feedback message -->
            <div id="bubble-feedback"></div>

        </div>
    </section>

    <!-- ========================= SHARED MODAL ========================== -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-emoji" id="modal-emoji">🎉</div>
            <h2 class="modal-title" id="modal-title">Amazing!</h2>
            <p class="modal-sub" id="modal-sub"></p>
            <p class="modal-score" id="modal-score"></p>
            <div class="modal-actions">
                <button class="modal-btn green" id="modal-play-again" onclick="modalPlayAgain()">Play Again</button>
                <button class="modal-btn purple" onclick="closeModal(); window.location.href='index.html'">🏠
                    Home</button>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script src="bubble.js"></script>

</body>

</html>
